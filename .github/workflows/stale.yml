name: stale

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          stale-issue-message: >
            This issue has been inactive for 60 days. It will be closed in 30 days
            unless there is new activity. If this is still relevant, please comment
            or remove the stale label.
          close-issue-message: >
            Closed due to 90 days of inactivity. Feel free to reopen if still relevant.
          stale-pr-message: >
            This PR has been inactive for 30 days. It will be closed in 14 days
            unless there is new activity.
          close-pr-message: >
            Closed due to inactivity. Feel free to reopen if still relevant.
          days-before-issue-stale: 60
          days-before-issue-close: 30
          days-before-pr-stale: 30
          days-before-pr-close: 14
          stale-issue-label: "status:stale"
          stale-pr-label: "status:stale"
          exempt-issue-labels: "priority:p0-critical,priority:p1-high,status:blocked"
          exempt-pr-labels: "priority:p0-critical,priority:p1-high,status:blocked"
