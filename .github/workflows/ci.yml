name: ci

on:
  push:
    branches: [main]
    paths:
      - "crates/**"
      - "python/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "pyproject.toml"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "crates/**"
      - "python/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "pyproject.toml"
      - ".github/workflows/ci.yml"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rust:
    name: rust (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: fmt
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: test
        run: cargo test

  build:
    name: build wheel (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: set up python
        run: uv python install 3.12
      - name: build abi3 wheel
        run: |
          uv venv --python 3.12
          uv pip install maturin
          uv run maturin build --release --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.os }}
          path: dist/*.whl
          retention-days: 1

  python:
    name: python (${{ matrix.os }}, py${{ matrix.python }})
    needs: build
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.11", "3.14"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - uses: actions/download-artifact@v4
        with:
          name: wheel-${{ matrix.os }}
          path: dist
      - name: set up python
        run: uv python install ${{ matrix.python }}
      - name: install wheel
        run: |
          uv venv --python ${{ matrix.python }}
          uv pip install dist/*.whl
      - name: smoke test
        run: |
          uv run --no-project python -c "import farol; print(farol.version())"
          uv run --no-project farol --version
