# Minimal farol configuration.
# See https://github.com/ferrumio/farol for the full reference.

site_name = "My Docs"

[theme]
name = "default"

# All builtin plugins run by default. To disable specific ones:
#
#   [plugins]
#   disabled = ["reading-time", "prev-next"]
#
# Or, to run only a specific set (everything else is skipped):
#
#   [plugins]
#   enabled = ["syntax-highlight", "sitemap"]
